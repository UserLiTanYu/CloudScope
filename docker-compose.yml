services:
  mysql:
    image: mysql:8.4
    container_name: cloudscope-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cloudscope
      MYSQL_USER: cloudscope
      MYSQL_PASSWORD: cloudscope
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cloudscope-backend
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: cloudscope
      MYSQL_PASSWORD: cloudscope
      MYSQL_DATABASE: cloudscope
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: cloudscope-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
